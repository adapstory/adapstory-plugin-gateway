# Test profile for Plugin Gateway integration tests.
# Redis/Kafka/JWKS URLs are overridden by @DynamicPropertySource in AbstractGatewayIntegrationTest.

spring:
  kafka:
    consumer:
      auto-offset-reset: earliest

# Gateway test overrides
gateway:
  jwt:
    jwks-uri: http://placeholder:0/certs
    issuer: https://auth.adapstory.com/realms/plugins
    audience: adapstory-core
    jwks-cache-ttl-minutes: 5

  routes:
    content: http://placeholder:0

  kafka:
    topics:
      permission-revocation: GLOBAL_PLUGIN_PERMISSIONS_REVOKED

  permission-cache:
    ttl-minutes: 5
    key-prefix: "plugin:permissions:"

  webhook:
    retry-max-attempts: 2
    retry-initial-interval-ms: 100
    retry-multiplier: 1.5
    plugin-pod-port: 0
    internal-secret: ""

# Minimal Resilience4j circuit breaker config for faster test feedback
# (Configured programmatically in ResilienceConfig, but override via test profile
#  is handled by a test-specific @Bean — see individual test classes)
