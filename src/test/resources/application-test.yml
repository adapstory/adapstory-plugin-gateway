# Test profile for Plugin Gateway integration tests.
# Redis/Kafka/JWKS URLs are overridden by @DynamicPropertySource in AbstractGatewayIntegrationTest.

spring:
  kafka:
    consumer:
      auto-offset-reset: earliest
  main:
    allow-bean-definition-overriding: true

adapstory:
  openapi:
    enabled: true
    title: Plugin Gateway API
    summary: Internal plugin and MCP gateway API
    description: First-party internal API for BC-02 Plugin Gateway REST proxying, webhook dispatch, and MCP routing for plugin tools.
    version: 2026.04.1
    api-major: v1
    audience: internal
    ai-ready: true

# Gateway test overrides
gateway:
  jwt:
    jwks-uri: http://placeholder:0/certs
    issuer: https://auth.adapstory.com/realms/adapstory
    audience: adapstory-plugin-gateway
    jwks-cache-ttl-minutes: 5

  bc02:
    base-url: http://placeholder:0

  routes:
    content: http://placeholder:0

  kafka:
    topics:
      permission-revocation: GLOBAL_PLUGIN_PERMISSIONS_REVOKED

  permission-cache:
    ttl-minutes: 5
    key-prefix: "plugin:permissions:"

  installed-cache:
    ttl-minutes: 5
    negative-ttl-seconds: 30

  mcp:
    plugin-pod-port: 8000
    plugin-host-template: "plugin-%s.plugins.svc.cluster.local"
    connect-timeout-ms: 5000

  webhook:
    retry-max-attempts: 2
    retry-initial-interval-ms: 100
    retry-multiplier: 1.5
    plugin-pod-port: 0
    internal-secret: ""

# Minimal Resilience4j circuit breaker config for faster test feedback
# (Configured programmatically in ResilienceConfig, but override via test profile
#  is handled by a test-specific @Bean — see individual test classes)
