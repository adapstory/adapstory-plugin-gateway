server:
  port: 8090
  shutdown: graceful

spring:
  application:
    name: adapstory-plugin-gateway
  lifecycle:
    timeout-per-shutdown-phase: 30s
  profiles:
    group:
      dev-local: dev    # --spring.profiles.active=dev-local → includes dev (K8s URLs)
      dev-remote: dev   # --spring.profiles.active=dev-remote → includes dev (K8s URLs)

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: plugin-gateway-group
      auto-offset-reset: earliest

# Keycloak JWKS configuration
gateway:
  jwt:
    jwks-uri: http://localhost:8080/realms/plugins/protocol/openid-connect/certs
    issuer: https://auth.adapstory.com/realms/plugins
    audience: adapstory-core
    jwks-cache-ttl-minutes: 60  # ARCH-1: Keycloak SPOF mitigation — 60 min cache

  # Route-to-BC mapping (overridden by GATEWAY_ROUTES_* env vars in cluster)
  routes:
    content: http://localhost:8081
    submission: http://localhost:8080
    identity: http://localhost:8082
    plugin: http://localhost:8080
    tenant: http://localhost:8080

  # Route-to-permission mapping (HTTP method -> required permission suffix)
  permissions:
    route-mappings:
      content:
        GET: content.read
        POST: content.write
        PUT: content.write
        DELETE: content.write
      submission:
        GET: submission.read
        POST: submission.write
        PUT: submission.write
        DELETE: submission.write
      identity:
        GET: identity.read
        POST: identity.write
        PUT: identity.write
        DELETE: identity.write
      plugin:
        GET: plugin.read
        POST: plugin.write
        PUT: plugin.write
        DELETE: plugin.write
      tenant:
        GET: tenant.read
        POST: tenant.write
        PUT: tenant.write
        DELETE: tenant.write

  # BC-02 (Plugin Lifecycle) connection for manifest-based permission checks (SEC-3.2)
  bc02:
    base-url: http://localhost:8081

  # Kafka topic configuration
  kafka:
    topics:
      permission-revocation: GLOBAL_PLUGIN_PERMISSIONS_REVOKED

  # Permission cache
  permission-cache:
    ttl-minutes: 5
    key-prefix: "plugin:permissions:"

  # Installed-plugin cache (Redis cache-aside for BC-02 installed checks)
  installed-cache:
    ttl-minutes: 5
    negative-ttl-seconds: 30

  # MCP route configuration (POST /internal/plugins/{slug}/mcp → plugin backend /mcp)
  mcp:
    plugin-pod-port: 8000
    plugin-host-template: "plugin-%s.plugins.svc.cluster.local"
    connect-timeout-ms: 30000

  # Webhook dispatch
  webhook:
    retry-max-attempts: 3
    retry-initial-interval-ms: 1000
    retry-multiplier: 2.0
    plugin-pod-port: 8000
    plugin-pod-host-template: "plugin-%s"
    internal-secret: ""

# Note: Resilience4j circuit breaker is configured programmatically in ResilienceConfig.java
# (per-route isolation via CircuitBreakerRegistry). Do NOT add resilience4j YAML section here.

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    redis:
      enabled: true
  opentelemetry:
    resource-attributes:
      "tenant.id": "${TENANT_ID:unknown}"
